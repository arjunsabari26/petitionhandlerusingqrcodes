{% extends 'base.html' %}
{% block title %}Sign Up - Petition Handler{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0 rounded-4 mt-2">
            <div class="card-body p-5">
                <h3 class="text-center mb-4 fw-bold text-primary">Create an Account</h3>
                <p class="text-center text-muted small mb-4">Join now to track and manage your petitions effectively.
                </p>
                <form method="POST" action="{{ url_for('signup') }}">
                    <div class="mb-3">
                        <label for="name" class="form-label text-muted fw-semibold">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="fa-solid fa-user text-primary"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" id="name" name="name"
                                placeholder="John Doe" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label text-muted fw-semibold">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="fa-solid fa-envelope text-primary"></i></span>
                            <input type="email" class="form-control border-start-0 ps-0" id="email" name="email"
                                placeholder="example@email.com" required>
                        </div>
                        <div class="form-text small">Register with an @admin.com email for admin privileges.</div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label text-muted fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="fa-solid fa-lock text-primary"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0" id="password"
                                name="password" placeholder="********" required minlength="6">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm rounded-pill">Sign
                        Up</button>

                    <div class="text-center mt-4">
                        <p class="text-muted small">Already have an account? <a href="{{ url_for('login') }}"
                                class="text-decoration-none fw-bold">Login</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
